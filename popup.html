<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DeepCycle</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet"
    href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
  <style>
    .ms {
      font-family: 'Material Symbols Rounded';
      font-size: 18px;
      vertical-align: middle;
      margin-right: 4px;
      font-variation-settings: 'FILL' 1, 'wght' 500;
    }

    body {
      padding: 10px 14px 8px;
      width: 380px;
    }

    .container {
      max-width: 380px;
    }

    /* Hydration vertical strip */
    .hydration-strip {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 6px;
      padding: 4px 6px;
      margin-left: 12px;
      border-left: 1px solid var(--border);
      min-width: 42px;
    }

    .hydration-strip .h-btn {
      width: 26px;
      height: 26px;
      padding: 0;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 15px;
      font-weight: 700;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text);
      cursor: pointer;
      transition: all 0.2s;
    }

    .hydration-strip .h-btn:hover {
      background: var(--brand-lime);
      color: #002719;
      border-color: var(--brand-lime);
    }

    .hydration-strip .h-count {
      font-size: 13px;
      font-weight: 700;
      color: var(--text);
      line-height: 1;
    }

    .hydration-strip .h-icon {
      font-size: 16px;
      color: var(--brand-lime);
      opacity: 0.5;
      margin: 0;
    }
  </style>
</head>

<body>
  <div class="container" style="padding-bottom: 4px;">
    <header style="margin-bottom: 6px;">
      <h1 style="font-size: 16px; margin-bottom: 4px; font-weight: 500; color: var(--text-muted);">DeepCycle</h1>
    </header>

    <!-- TIMER CARD (contains timer + hydration strip) -->
    <div class="card" id="timerCard" style="padding: 12px 14px; margin-bottom: 8px;">
      <div style="display: flex; align-items: center; gap: 12px;">
        <!-- LEFT: Timer circle -->
        <div style="width: 110px; height: 110px; position: relative; flex-shrink: 0;">
          <svg width="110" height="110" viewBox="0 0 180 180"
            style="position: absolute; top: 0; left: 0; transform: rotate(-90deg);">
            <circle cx="90" cy="90" r="80" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="6" />
            <circle id="timerProgress" cx="90" cy="90" r="80" fill="none" stroke="var(--brand-lime)" stroke-width="6"
              stroke-dasharray="502.65" stroke-dashoffset="0" stroke-linecap="round"
              style="transition: stroke-dashoffset 1s linear; filter: drop-shadow(0 0 6px rgba(174,237,34,0.4));" />
          </svg>
          <!-- Timer text: absolute dead-center -->
          <div
            style="position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; pointer-events: none;">
            <div id="timer"
              style="font-size: 22px; font-weight: 700; font-variant-numeric: tabular-nums; color: var(--text); line-height: 1; white-space: nowrap;">
              --:--</div>
            <div id="timerLabel"
              style="font-size: 8px; color: var(--text-muted); margin-top: 4px; line-height: 1; white-space: nowrap;">
              Ready to focus</div>
          </div>
        </div>

        <!-- MIDDLE: Phase + Controls -->
        <div style="flex: 1; display: flex; flex-direction: column; justify-content: center; gap: 8px; min-width: 0;">
          <div id="phaseDisplay" style="font-size: 11px; color: var(--text-muted); font-weight: 500;"></div>
          <div style="display: flex; gap: 6px;">
            <button id="startPauseBtn" class="action-btn"
              style="flex: 1; padding: 8px 10px; font-weight: 600; font-size: 12px; border-radius: 6px; display: flex; align-items: center; justify-content: center; gap: 4px;">
              <span class="ms" style="font-size: 14px;" id="startPauseIcon">play_arrow</span>
              <span id="startPauseBtnText">Start</span>
            </button>
            <button id="resetBtn" class="action-btn secondary"
              style="padding: 8px 10px; font-size: 12px; border-radius: 6px; display: none;" title="Reset">
              <span class="ms" style="font-size: 14px;">stop</span>
            </button>
          </div>
        </div>

        <!-- RIGHT: Hydration strip (vertical separator) -->
        <div class="hydration-strip">
          <button id="addWaterBtn" class="h-btn" title="Add water">+</button>
          <span id="waterCount" class="h-count">0</span>
          <span class="ms h-icon">water_drop</span>
        </div>
      </div>
    </div>

    <!-- TIMER (Advanced) -->
    <div class="flex-row" style="margin-bottom: 6px;">
      <button id="timerBtn" title="Timer"
        style="width: 100%; padding: 8px; font-weight: 600; font-size: 12px; border-radius: 6px;"
        class="action-btn secondary">
        <span class="ms" style="font-size:14px;">timer</span>Timer
      </button>
    </div>

    <!-- FOCUS MODE TOGGLE -->
    <div class="card" id="focusModeCard" style="padding: 8px 14px; margin-bottom: 6px; font-size: 12px;">
      <div style="display: flex; justify-content: space-between; align-items: center;">
        <span><span class="ms" style="font-size: 14px;">block</span>Focus Mode</span>
        <label style="position: relative; display: inline-block; width: 36px; height: 20px; margin: 0;">
          <input type="checkbox" id="focusModeToggle" style="opacity: 0; width: 0; height: 0;">
          <span id="focusToggleTrack"
            style="position: absolute; cursor: pointer; inset: 0; background: var(--surface); border: 1px solid var(--border); border-radius: 20px; transition: all 0.2s;"></span>
          <span id="focusToggleThumb"
            style="position: absolute; content: ''; height: 14px; width: 14px; left: 3px; top: 3px; background: var(--text-muted); border-radius: 50%; transition: all 0.2s;"></span>
        </label>
      </div>
    </div>

    <!-- AMBIENT SOUND (hidden by master switch) -->
    <div class="card hidden" id="soundCard" style="padding: 8px 14px; margin-bottom: 6px;">
      <div style="display: flex; justify-content: space-between; align-items: center;">
        <span style="font-size: 12px;"><span class="ms" style="font-size: 14px;">music_note</span>Ambient</span>
        <select id="ambientSelect"
          style="width: auto; padding: 3px 6px; font-size: 11px; background: var(--surface); color: var(--text); border: 1px solid var(--border); border-radius: 4px;">
          <option value="none">none</option>
          <option value="ambient/lofi">lofi</option>
          <option value="ambient/rain">rain</option>
          <option value="ambient/cafe">cafe</option>
        </select>
      </div>
    </div>

    <!-- CONTROLS -->
    <div class="flex-row" style="gap: 6px;">
      <button id="optionsBtn" class="action-btn secondary" title="Settings"
        style="flex: 1; padding: 8px 6px; display: flex; align-items: center; justify-content: center; gap: 4px; font-size: 12px;">
        <span class="ms" style="font-size:14px;">settings</span>Settings
      </button>
      <button id="statsBtn" class="action-btn secondary" title="Analytics"
        style="flex: 1; padding: 8px 6px; display: flex; align-items: center; justify-content: center; gap: 4px; font-size: 12px;">
        <span class="ms" style="font-size:14px;">bar_chart</span>Analytics
      </button>
    </div>

    <!-- FOOTER BRANDING (single line) -->
    <div
      style="font-size: 9px; color: var(--text-muted); opacity: 0.5; text-align: center; margin-top: 8px; line-height: 1.5; display: flex; align-items: center; justify-content: center; gap: 4px; flex-wrap: wrap;">
      <span style="font-weight: 600;">Powered by <a href="#" data-link="degirdProducts" target="_blank"
          style="color: var(--brand-lime); text-decoration: none;">Degird</a></span>
      <span style="opacity: 0.4;">|</span>
      <span>
        <a href="#" data-link="reviewUs"
          target="_blank" style="color: inherit; text-decoration: underline;">Review Us</a>
        <span style="margin: 0 2px;">·</span>
        <a href="#" data-link="moreTools" target="_blank"
          style="color: inherit; text-decoration: underline;">More Tools</a>
      </span>
    </div>
  </div>
  <script src="links.js"></script>
  <script src="popup.js"></script>
</body>

</html>
