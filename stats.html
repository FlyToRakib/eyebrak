<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Eyebrak Stats</title>
<link rel="stylesheet" href="styles.css">
</head>
<body style="width: 500px; min-height: auto;">
<div class="container">
  <header>
    <h1>Usage Analytics</h1>
  </header>

  <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 16px;">
    <div class="card" style="text-align: center;">
      <h3>Reminders</h3>
      <div class="stat-value" id="total" style="font-size: 32px; margin-top: 10px;">0</div>
    </div>
    <div class="card" style="text-align: center;">
      <h3>Breaks</h3>
      <div class="stat-value" id="breaks" style="font-size: 32px; margin-top: 10px;">0</div>
    </div>
  </div>

  <div class="card">
    <div class="stat-row">
      <h3>Current Streak</h3>
      <span class="stat-value" id="streak">0</span>
    </div>
    <p style="font-size: 12px; color: var(--text-dim); margin-top: 8px;">Keep it up! Your eyes will thank you.</p>
  </div>

  <div class="card">
    <h3>💧 Hydration Progress</h3>
    <div style="display: flex; justify-content: space-between; align-items: center; margin-top: 10px;">
      <span id="waterStatText">0 / 8 glasses</span>
      <span class="stat-value" id="waterPercent">0%</span>
    </div>
    <div style="height: 8px; background: var(--secondary-bg); border-radius: 4px; margin-top: 8px; overflow: hidden;">
      <div id="waterBar" style="height: 100%; width: 0%; background: #4fc3f7; transition: width 0.5s ease;"></div>
    </div>
  </div>

  <div class="card">
    <h3>📊 Daily Activity (Active Minutes)</h3>
    <div id="activityGraph" style="display: flex; align-items: flex-end; gap: 4px; height: 100px; margin-top: 15px; border-bottom: 1px solid var(--glass-border); padding-bottom: 5px;">
      <!-- Bars injected via JS -->
    </div>
    <div style="display: flex; justify-content: space-between; font-size: 10px; color: var(--text-dim); margin-top: 5px;">
      <span>12 AM</span>
      <span>12 PM</span>
      <span>11 PM</span>
    </div>
  </div>

  <div class="card">
    <h3>Wellness Score</h3>
    <div style="height: 12px; background: var(--secondary-bg); border-radius: 6px; margin-top: 12px; overflow: hidden;">
      <div id="wellnessBar" style="height: 100%; width: 0%; background: var(--accent-color); transition: width 1s ease-out;"></div>
    </div>
    <p style="text-align: right; font-size: 11px; margin-top: 5px; color: var(--text-dim);" id="wellnessText">Calculating...</p>
  </div>
</div>
<script src="stats.js"></script>
</body>
</html>
