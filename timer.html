<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DeepCycle Standalone Timer</title>
<link rel="stylesheet" href="timer.css">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
</head>
<body>

<div class="timer-container">
  <h1>Standalone Countdown</h1>
  
  <div class="tabs" id="timerTabs">
    <button class="tab-btn active" data-tab="onetime">One-Time</button>
    <button class="tab-btn" data-tab="repetitive">Repetitive</button>
    <button class="tab-btn" data-tab="stopwatch">Stopwatch</button>
  </div>
  
  <div class="tab-content active" id="tab-onetime">
    <div class="input-group">
      <input type="number" id="durationInput" min="1" max="999" placeholder="25" value="25">
      <span class="muted">minutes</span>
    </div>
  </div>

  <div class="tab-content hidden" id="tab-repetitive">
    <div class="input-group" style="align-items: center;">
      <div style="display:flex; flex-direction: column; align-items: center; gap:4px;">
        <label style="color: var(--text-dim); font-size:12px; font-weight:600; text-transform:uppercase;">Interval</label>
        <div style="display:flex; align-items:baseline; gap:5px;">
          <input type="number" id="repIntervalInput" min="1" max="999" placeholder="15" value="15" style="width: 80px; font-size:40px; border:none; border-bottom:2px solid var(--accent-color); background:transparent; color:white; text-align:center; outline:none; font-weight:700;">
          <span class="muted" style="font-size:16px;">min</span>
        </div>
      </div>
      <div style="display:flex; flex-direction: column; align-items: center; gap:4px;">
        <label style="color: var(--text-dim); font-size:12px; font-weight:600; text-transform:uppercase;">Cycles</label>
        <div style="display:flex; align-items:baseline; gap:5px;">
          <input type="number" id="repCyclesInput" min="1" max="99" placeholder="4" value="4" style="width: 60px; font-size:40px; border:none; border-bottom:2px solid var(--accent-color); background:transparent; color:white; text-align:center; outline:none; font-weight:700;">
        </div>
      </div>
    </div>
  </div>

  <div class="tab-content hidden" id="tab-stopwatch">
     <p class="muted" style="margin-bottom: 15px; font-size:16px;">Counts up infinitely until stopped.</p>
  </div>

  <div class="display-group hidden" id="displaySection" style="text-align: center;">
    <p id="cycleStatusDisplay" style="margin-bottom: 20px; color: var(--accent-color); font-weight: 700; text-transform: uppercase; letter-spacing: 2px; font-size: 14px; opacity: 0; transition: opacity 0.3s;"></p>
    
    <div style="position: relative; width: 300px; height: 300px; margin: 0 auto;">
      <svg width="300" height="300" style="overflow: visible;">
        <defs>
          <linearGradient id="timerGradient" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" style="stop-color:var(--text-main);" />
            <stop offset="100%" style="stop-color:var(--accent-color);" />
          </linearGradient>
          <filter id="circleGlow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur in="SourceGraphic" stdDeviation="6" result="blur" />
            <feColorMatrix in="blur" type="matrix"
              values="0 0 0 0 0.506
                      0 0 0 0 0.780
                      0 0 0 0 0.518
                      0 0 0 1 0" result="coloredBlur" />
            <feMerge>
              <feMergeNode in="coloredBlur" />
              <feMergeNode in="coloredBlur" />
              <feMergeNode in="SourceGraphic" />
            </feMerge>
          </filter>
        </defs>
        <circle cx="150" cy="150" r="140" fill="none" stroke="rgba(255,255,255,0.05)" stroke-width="10" />
        <circle id="timerProgress" cx="150" cy="150" r="140" fill="none"
          stroke="url(#timerGradient)" stroke-width="10"
          stroke-dasharray="879.64" stroke-dashoffset="0"
          stroke-linecap="round"
          filter="url(#circleGlow)"
          style="transition: stroke-dashoffset 1s linear; transform: rotate(-90deg); transform-origin: 50% 50%;" />
      </svg>
      <div style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; align-items: center; justify-content: center;">
        <div id="timeDisplay" style="font-size: 64px; font-weight: 800; font-variant-numeric: tabular-nums; letter-spacing: -2px; text-shadow: 0 4px 15px rgba(129, 199, 132, 0.3); line-height: 1;">25:00</div>
      </div>
    </div>

    <div style="margin-top: 25px; display: flex; align-items: center; justify-content: center; gap: 8px;">
      <input type="checkbox" id="timerBeepToggle" style="width: auto;">
      <label for="timerBeepToggle" style="font-size: 14px; color: var(--text-dim); cursor: pointer; font-weight: 500;">Continuous Beep</label>
    </div>
  </div>

  <div class="controls">
    <button id="startBtn" class="primary-btn">Start Session</button>
    <button id="resetBtn" class="secondary-btn hidden">Reset</button>
  </div>
</div>

<script src="timer.js"></script>
</body>
</html>
